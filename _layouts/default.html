<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1, h2, h3 { line-height: 1.2; }
    a { color: #0366d6; }
    a:hover { text-decoration: underline; }
    pre { background: #f0f0f0; padding: 1rem; overflow-x: auto; border-radius: 4px; }
    code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
    pre code { padding: 0; background: none; }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1rem; }
    .post-meta { color: #666; font-size: 0.9rem; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin-bottom: 1.5rem; }
    .post-list h2 { margin: 0 0 0.25rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
